<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product</title>

    <link rel="stylesheet" href="style.css">

    <script src="script.js"></script>
</head>
<body>
    
    <div class="items">
        <div class="Container">
            <div class="inner-items">
                <h1>Products</h1>
                <hr>
                <div class="item-group">
                    <div class="item">

                        <h3>Chocolate cake</h3>
                        <p>Price: 310</p>

                        <button class="add-to-cart">Add to cart</button>
                    </div>

                    <div class="item">
                        <img src="https://i.pinimg.com/1200x/c8/b1/31/c8b131e940732fae50b03156216ffcab.jpg" alt="Cake" srcset="">
                        <h3>Cheese Cake</h3>
                        <p>Price: 400</p>

                        <button class="add-to-cart">Add to cart</button>
                    </div>

                    <div class="item">
                        <img src="https://i.pinimg.com/1200x/1c/33/cc/1c33cc899da4f68c4ef8aa14574bc97e.jpg" alt="Browine" srcset="">
                        <h3>Browine</h3>
                        <p>Price: 200</p>

                        <button class="add-to-cart">Add to cart</button>
                    </div>

                    <div class="item">
                        <img src="https://i.pinimg.com/736x/7c/9d/77/7c9d77349ea45e0aa6e11f71b3e840e0.jpg" alt="Cookies" srcset="">
                        <h3>Cookies</h3>
                        <p>Price: 150</p>

                        <button class="add-to-cart">Add to cart</button>
                    </div>

                    <div class="item">
                        <img src="https://i.pinimg.com/736x/76/75/b8/7675b877b2c9891c6af4900e2aba0b70.jpg" alt="Cookies" srcset="">
                        <h3>Cookies</h3>
                        <p>Price: 150</p>

                        <button class="add-to-cart">Add to cart</button>
                    </div>
                </div>

            </div>
        </div>
        
    </div>
</body>
</html>
